name: Atualizacao Automatica do Mapa

on:
  schedule:
    - cron: '0 4 * * *' # Roda automaticamente todos os dias às 4h da manhã
  workflow_dispatch: # Permite que tu cliques num botão para atualizar quando quiseres

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar o repositorio
      uses: actions/checkout@v3

    - name: Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: pip install pandas requests openpyxl

    - name: Rodar Script de Atualizacao
      run: python gerar_notas.py

    - name: Salvar alteracoes no GitHub
      run: |
        git config --global user.name 'Robo de Atualizacao'
        git config --global user.email 'actions@github.com'
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "Atualizacao automatica de autores: $(date +'%Y-%m-%d')" && git push)
